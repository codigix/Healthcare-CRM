name: Deploy Healthcare-CRM to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/Healthcare-CRM
            git pull origin main

            # Backend
            cd backend
            npm install --production  # ← using npm install
            npm run build
            cd ..

            # Frontend (Next.js)
            cd frontend
            npm install               # ← using npm install
            npm run build
            cd ..

            # Restart PM2 apps
            pm2 restart healthcare-crm-backend
            pm2 restart healthcare-crm-frontend